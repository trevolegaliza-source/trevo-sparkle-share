<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; letter-spacing: -0.005em; }
  h1, h2, h3 { letter-spacing: -0.02em; }
  body { background: #f8fafc; color: #0f172a; margin: 0; }
  .tabular-nums { font-variant-numeric: tabular-nums; }
  .heading-1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; }
  .heading-2 { font-size: 1rem; font-weight: 600; letter-spacing: -0.015em; }
  .label-uppercase { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; }
  .caption { font-size: 12px; color: #94a3b8; }
  .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; transition: all 0.15s; cursor: pointer; border: 1px solid transparent; }
  .btn-primary { background: #16a34a; color: white; }
  .btn-primary:hover { background: #15803d; }
  .btn-outline { border: 1px solid #e2e8f0; background: white; color: #0f172a; }
  .btn-outline:hover { border-color: #16a34a; }
  .input { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; }
  .input:focus { outline: none; border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.1); }
  .accent-bar { width: 3px; align-self: stretch; background: #16a34a; border-radius: 2px; }
  .page-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 24px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
  .badge-amber { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
  .badge-red { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
  .badge-blue { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
  .badge-slate { background: #f8fafc; color: #475569; border: 1px solid #e2e8f0; }
</style>
