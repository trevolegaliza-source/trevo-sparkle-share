<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Colaboradores — Trevo Legaliza</title>
<!--
  Tela: /colaboradores
  Source: src/pages/Colaboradores.tsx

  Lista colaboradores cadastrados (CLT/PJ/Estagiario):
  - Header + botão "Novo Colaborador"
  - 3 KPIs: Total / Folha mensal / A pagar este mês
  - Filtro por status (Ativos/Inativos)
  - Lista cards: foto/avatar, nome, cargo, salario base, dia pagamento,
    status (Ativo/Inativo), botões editar/desativar
  - Cada card abre modal com detalhes + histórico de pagamentos + cadastro PIX
-->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; letter-spacing: -0.005em; }
  body { background: #f8fafc; color: #0f172a; margin: 0; }
  .heading-1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; }
  .caption { font-size: 12px; color: #94a3b8; }
  .display-2 { font-size: 1.75rem; font-weight: 700; line-height: 1.1; letter-spacing: -0.025em; }
  .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; }
  .accent-bar { width: 3px; align-self: stretch; background: #16a34a; border-radius: 2px; }
  .tabular-nums { font-variant-numeric: tabular-nums; }
</style>
</head>
<body class="p-6">
<div class="max-w-7xl mx-auto space-y-6">

  <div class="flex items-start justify-between">
    <div class="flex items-start gap-3">
      <div class="accent-bar"></div>
      <div>
        <h1 class="heading-1">Colaboradores</h1>
        <p class="caption mt-1">Equipe Trevo — gerenciar folha e pagamentos</p>
      </div>
    </div>
    <button class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-semibold">+ Novo Colaborador</button>
  </div>

  <div class="grid grid-cols-3 gap-4">
    <div class="card"><div class="caption">Total</div><div class="display-2 mt-2 tabular-nums">5</div></div>
    <div class="card"><div class="caption">Folha mensal</div><div class="display-2 mt-2 tabular-nums">R$ 14.800</div></div>
    <div class="card border-amber-500/30 bg-amber-50/30"><div class="caption">A pagar este mês</div><div class="display-2 mt-2 tabular-nums text-amber-700">R$ 8.400</div></div>
  </div>

  <div class="space-y-2">
    <div class="card flex items-center justify-between gap-4 hover:border-emerald-300 cursor-pointer">
      <div class="flex items-center gap-4">
        <div class="h-12 w-12 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold">CV</div>
        <div>
          <div class="text-sm font-semibold">Carolina Vieira</div>
          <div class="caption">Financeiro · CLT · Salário R$ 4.200,00 · Vence dia 5</div>
          <div class="flex gap-2 mt-1">
            <span class="text-[10px] px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700 font-bold uppercase">Ativo</span>
            <span class="text-[10px] px-1.5 py-0.5 rounded bg-blue-100 text-blue-700">PIX cadastrado</span>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button class="px-3 py-2 border border-slate-200 rounded-lg text-sm">Editar</button>
        <button class="px-3 py-2 border border-amber-200 text-amber-700 rounded-lg text-sm">💸 Avisar Pagamento</button>
        <button class="text-slate-400 hover:text-slate-700">⋯</button>
      </div>
    </div>
    <div class="card flex items-center justify-between gap-4 hover:border-emerald-300 cursor-pointer">
      <div class="flex items-center gap-4">
        <div class="h-12 w-12 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold">DS</div>
        <div>
          <div class="text-sm font-semibold">Daniel Silva</div>
          <div class="caption">Operacional · PJ · Salário R$ 3.500,00 · Vence dia 10</div>
          <div class="flex gap-2 mt-1">
            <span class="text-[10px] px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700 font-bold uppercase">Ativo</span>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button class="px-3 py-2 border border-slate-200 rounded-lg text-sm">Editar</button>
        <button class="px-3 py-2 border border-amber-200 text-amber-700 rounded-lg text-sm">💸 Avisar Pagamento</button>
        <button class="text-slate-400 hover:text-slate-700">⋯</button>
      </div>
    </div>
  </div>

</div>
</body>
</html>
