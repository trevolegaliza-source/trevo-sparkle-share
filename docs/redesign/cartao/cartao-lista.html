<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cartão — Lista — Trevo Legaliza</title>
<!--
  Tela: /cartao
  Source: src/pages/Cartao.tsx

  Cartões corporativos cadastrados:
  - Header + botão "Novo Cartão"
  - Lista de cartões: nome, bandeira (Visa/Master), 4 últimos dígitos,
    titular (colaborador), limite, fechamento, vencimento, fatura aberta
  - Click abre /cartao/:id (detalhe da fatura corrente + histórico)
-->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; letter-spacing: -0.005em; }
  body { background: #f8fafc; color: #0f172a; margin: 0; }
  .heading-1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; }
  .caption { font-size: 12px; color: #94a3b8; }
  .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; }
  .accent-bar { width: 3px; align-self: stretch; background: #16a34a; border-radius: 2px; }
  .tabular-nums { font-variant-numeric: tabular-nums; }
  .credit-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; border-radius: 12px; padding: 20px; min-height: 180px; display: flex; flex-direction: column; justify-content: space-between; }
</style>
</head>
<body class="p-6">
<div class="max-w-7xl mx-auto space-y-6">

  <div class="flex items-start justify-between">
    <div class="flex items-start gap-3">
      <div class="accent-bar"></div>
      <div>
        <h1 class="heading-1">Cartão</h1>
        <p class="caption mt-1">Cartões corporativos e faturas mensais</p>
      </div>
    </div>
    <button class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-semibold">+ Novo Cartão</button>
  </div>

  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">

    <!-- Cartão #1 -->
    <button class="text-left">
      <div class="credit-card hover:shadow-lg transition-shadow">
        <div class="flex justify-between items-start">
          <div>
            <div class="text-xs uppercase tracking-wider opacity-60">Itaú · Black</div>
            <div class="text-xl font-mono mt-2">•••• •••• •••• 4521</div>
          </div>
          <div class="text-2xl">💳</div>
        </div>
        <div class="flex justify-between items-end">
          <div>
            <div class="text-[10px] uppercase opacity-60">Titular</div>
            <div class="text-sm font-semibold">THALES BURGER</div>
          </div>
          <div class="text-right">
            <div class="text-[10px] uppercase opacity-60">Limite</div>
            <div class="text-sm font-bold tabular-nums">R$ 30.000</div>
          </div>
        </div>
      </div>
      <div class="mt-3 px-1 flex items-center justify-between">
        <div class="text-sm">
          <strong class="text-slate-700">Fatura aberta:</strong>
          <span class="text-slate-900 font-bold tabular-nums">R$ 2.480,00</span>
        </div>
        <div class="caption">Vence 12/06</div>
      </div>
    </button>

    <!-- Cartão #2 -->
    <button class="text-left">
      <div class="credit-card hover:shadow-lg transition-shadow" style="background: linear-gradient(135deg, #047857 0%, #16a34a 100%);">
        <div class="flex justify-between items-start">
          <div>
            <div class="text-xs uppercase tracking-wider opacity-60">Bradesco · Empresarial</div>
            <div class="text-xl font-mono mt-2">•••• •••• •••• 8839</div>
          </div>
          <div class="text-2xl">💳</div>
        </div>
        <div class="flex justify-between items-end">
          <div>
            <div class="text-[10px] uppercase opacity-60">Titular</div>
            <div class="text-sm font-semibold">CAROLINA</div>
          </div>
          <div class="text-right">
            <div class="text-[10px] uppercase opacity-60">Limite</div>
            <div class="text-sm font-bold tabular-nums">R$ 15.000</div>
          </div>
        </div>
      </div>
      <div class="mt-3 px-1 flex items-center justify-between">
        <div class="text-sm">
          <strong class="text-slate-700">Fatura aberta:</strong>
          <span class="text-slate-900 font-bold tabular-nums">R$ 980,00</span>
        </div>
        <div class="caption">Vence 18/06</div>
      </div>
    </button>

  </div>

</div>
</body>
</html>
