<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login — Trevo Legaliza</title>
<!--
  Tela: /login
  Source: src/pages/Login.tsx

  Tela de entrada do ERP. Estrutura:
  - Logo Trevo centralizado
  - Card com email + senha + botão "Entrar"
  - Link "Esqueci minha senha" → /reset-password
  - Suporte 2FA via authenticator app (após senha)
  - Tipicamente fundo gradient verde sutil ou dark Trevo

  Não tem signup público — admin convida via Configurações > Usuários.
-->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; letter-spacing: -0.005em; }
  body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #f8fafc; margin: 0; min-height: 100vh; }
  h1 { letter-spacing: -0.025em; }
  .caption { font-size: 12px; color: #94a3b8; }
  .input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; background: white; color: #0f172a; }
  .input:focus { outline: none; border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.15); }
</style>
</head>
<body class="flex items-center justify-center p-6">

  <div class="w-full max-w-md">

    <!-- LOGO -->
    <div class="text-center mb-8">
      <div class="inline-block text-4xl font-extrabold tracking-tight mb-2">
        <span class="text-emerald-400">🍀 Trevo</span>
        <span class="font-medium text-white">Legaliza</span>
      </div>
      <div class="caption text-emerald-300">Departamento Societário Completo</div>
    </div>

    <!-- CARD LOGIN -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h1 class="text-2xl font-bold text-slate-900 mb-1">Entrar</h1>
      <p class="text-sm text-slate-500 mb-6">Acesse sua conta Trevo Legaliza</p>

      <div class="space-y-4">
        <div>
          <label class="text-xs font-semibold text-slate-700 mb-1.5 block">E-mail</label>
          <input class="input" type="email" placeholder="seu@email.com"/>
        </div>
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="text-xs font-semibold text-slate-700">Senha</label>
            <a class="text-xs text-emerald-600 font-semibold hover:underline">Esqueci minha senha</a>
          </div>
          <input class="input" type="password" placeholder="••••••••"/>
        </div>

        <button class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-bold transition-colors mt-2">
          Entrar →
        </button>
      </div>

      <div class="mt-6 pt-6 border-t border-slate-100 text-center">
        <p class="text-xs text-slate-500">
          Não tem acesso? Peça pro administrador da sua empresa criar sua conta.
        </p>
      </div>
    </div>

    <p class="text-center text-xs text-slate-500 mt-6">
      Trevo Legaliza · CNPJ 39.969.412/0001-70
    </p>

  </div>

</body>
</html>
