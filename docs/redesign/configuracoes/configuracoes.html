<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Configurações — Trevo Legaliza</title>
<!--
  Tela: /configuracoes
  Source: src/pages/Configuracoes.tsx

  Tabs:
  - Empresa (dados da empresa, logo, CNPJ)
  - Usuarios (gestão usuários + perfis + permissões)
  - Integracoes (Asaas, ClickSign, Trello, Resend)
  - Notificacoes (preferências email/sino)
  - Seguranca (2FA, recovery codes, login history)
  - Preços (Valor Base padrão, descontos, etc)

  É uma tela "central" — cada tab pode ter sub-modais (Convidar Usuário, Editar Permissões).
-->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; letter-spacing: -0.005em; }
  body { background: #f8fafc; color: #0f172a; margin: 0; }
  .heading-1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; }
  .heading-2 { font-size: 1rem; font-weight: 600; }
  .caption { font-size: 12px; color: #94a3b8; }
  .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; }
  .accent-bar { width: 3px; align-self: stretch; background: #16a34a; border-radius: 2px; }
  .input { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; }
</style>
</head>
<body class="p-6">
<div class="max-w-7xl mx-auto space-y-6">

  <div class="flex items-start gap-3">
    <div class="accent-bar"></div>
    <div>
      <h1 class="heading-1">Configurações</h1>
      <p class="caption mt-1">Empresa, usuários, integrações e segurança</p>
    </div>
  </div>

  <div class="grid lg:grid-cols-4 gap-6">

    <!-- Sidebar de tabs -->
    <nav class="space-y-1">
      <a class="flex items-center gap-2 px-3 py-2 rounded-lg bg-emerald-50 text-emerald-700 text-sm font-semibold">🏢 Empresa</a>
      <a class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100 text-sm">👥 Usuários</a>
      <a class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100 text-sm">🔗 Integrações</a>
      <a class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100 text-sm">🔔 Notificações</a>
      <a class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100 text-sm">🔒 Segurança</a>
      <a class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100 text-sm">💰 Preços padrão</a>
    </nav>

    <!-- Conteúdo da tab -->
    <div class="lg:col-span-3 space-y-4">
      <div class="card">
        <h3 class="heading-2 mb-4">Dados da empresa</h3>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="caption">Razão social</label>
            <input class="input mt-1" value="Trevo Legaliza Assessoria Empresarial Ltda"/>
          </div>
          <div>
            <label class="caption">CNPJ</label>
            <input class="input mt-1" value="39.969.412/0001-70"/>
          </div>
          <div>
            <label class="caption">E-mail principal</label>
            <input class="input mt-1" value="administrativo@trevolegaliza.com.br"/>
          </div>
          <div>
            <label class="caption">Telefone</label>
            <input class="input mt-1" value="(11) 93492-7001"/>
          </div>
          <div class="col-span-2">
            <label class="caption">Endereço</label>
            <input class="input mt-1" value="Rua Brasil, nº 1170, Rudge Ramos, SBC/SP"/>
          </div>
        </div>
        <div class="mt-6 flex justify-end gap-2">
          <button class="px-4 py-2 border border-slate-200 rounded-lg text-sm">Cancelar</button>
          <button class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-semibold">Salvar</button>
        </div>
      </div>

      <div class="card">
        <h3 class="heading-2 mb-3">Logo da empresa</h3>
        <div class="flex items-center gap-4">
          <div class="h-20 w-20 rounded-lg bg-emerald-100 text-emerald-700 flex items-center justify-center text-3xl font-bold">🍀</div>
          <button class="px-4 py-2 border border-slate-200 rounded-lg text-sm">📁 Trocar logo</button>
        </div>
        <p class="caption mt-2">PNG ou SVG. Tamanho máx 2MB. Aparece no PDF de orçamentos e no link público.</p>
      </div>
    </div>

  </div>

</div>
</body>
</html>
