<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Trevo Legaliza — Regularização e cobranças online</title>
    <meta name="description" content="Plataforma Trevo Legaliza — propostas, cobranças e regularização empresarial em um só lugar.">
    <meta name="author" content="Trevo Legaliza" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trevo ERP" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph — preview que aparece quando link e compartilhado no WhatsApp/etc.
         Como SPA nao tem og dinamico por rota, mantemos generico (vale pra /proposta,
         /cobranca e qualquer outra). Antes: hard-coded "Cobranca" — confundia em /proposta. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Trevo Legaliza" />
    <meta property="og:url" content="https://app.trevolegaliza.com/" />
    <meta property="og:image" content="https://app.trevolegaliza.com/og-cobranca-sm.png">
    <meta property="og:image:width" content="400" />
    <meta property="og:image:height" content="400" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="https://app.trevolegaliza.com/og-cobranca-sm.png">
    
    

    <!-- Favicon -->

    <!-- Prevent iOS zoom on input focus -->
    <style>
      input, select, textarea { font-size: 16px !important; }
      body { -webkit-tap-highlight-color: transparent; }
      body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    </style>
    <meta property="og:title" content="Trevo Legaliza">
  <meta name="twitter:title" content="Trevo Legaliza">
  <meta property="og:description" content="Plataforma Trevo Legaliza — propostas, cobranças e regularização empresarial.">
  <meta name="twitter:description" content="Plataforma Trevo Legaliza — propostas, cobranças e regularização empresarial.">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
